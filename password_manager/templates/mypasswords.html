<!DOCTYPE html>
<html>
<head>
    <title>Meine Passwörter</title>
    <style>
        body {
            background: #0a0f1f;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #00eaff;
        }

        .box {
            background: rgba(10, 15, 31, 0.7);
            padding: 25px;
            width: 420px;
            text-align: center;
            border-radius: 12px;
            border: 2px solid #00eaff;
            box-shadow: 0 0 20px #00eaff;
        }

        h3 {
            text-shadow: 0 0 10px #00eaff;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 5px 0;
            background: transparent;
            border: 2px solid #00eaff;
            color: #00eaff;
            border-radius: 6px;
        }

        input::placeholder {
            color: #00eaff;
            opacity: 0.6;
        }

        .main-btn {
            width: 95%;
            padding: 10px;
            margin-top: 10px;
            background: transparent;
            border: 2px solid #ff005d;
            color: #ff005d;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 10px #ff005d;
            transition: 0.2s;
        }

        .main-btn:hover {
            background: #ff005d;
            color: white;
            box-shadow: 0 0 20px #ff005d;
        }

        .back-btn {
            border-color: #00eaff;
            color: #00eaff;
            box-shadow: 0 0 10px #00eaff;
        }

        .back-btn:hover {
            background: #00eaff;
            color: #0a0f1f;
            box-shadow: 0 0 20px #00eaff;
        }

        .list {
            margin-top: 20px;
            text-align: left;
            max-height: 260px;
            overflow-y: auto;
        }

        .item {
            background: rgba(0, 234, 255, 0.08);
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            border: 1px solid #00eaff;
            box-shadow: 0 0 10px #00eaff;
        }

        .item-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .note {
            font-size: 13px;
            opacity: 0.8;
        }

        .pw-text {
            font-weight: bold;
            margin-top: 4px;
            word-break: break-all;
        }

        .btn-row {
            margin-top: 8px;
            display: flex;
            gap: 8px;
        }

        .small-btn {
            flex: 1;
            padding: 6px 8px;
            font-size: 12px;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .copy-btn {
            border: 2px solid #00eaff;
            color: #00eaff;
            box-shadow: 0 0 8px #00eaff;
        }

        .copy-btn:hover {
            background: #00eaff;
            color: #0a0f1f;
            box-shadow: 0 0 16px #00eaff;
        }

        .delete-btn {
            border: 2px solid #ff005d;
            color: #ff005d;
            box-shadow: 0 0 8px #ff005d;
        }

        .delete-btn:hover {
            background: #ff005d;
            color: white;
            box-shadow: 0 0 16px #ff005d;
        }

        .msg {
            color: #00eaff;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>

<div class="box">
    <h3>Meine Passwörter</h3>

    <!-- Neues Passwort speichern -->
    <form method="post">
        {% csrf_token %}
        <input type="text" name="pw" placeholder="Passwort">
        <input type="text" name="note" placeholder="Beschreibung / Seite">
        <button type="submit" class="main-btn">Speichern</button>
    </form>

    <!-- Liste der gespeicherten Passwörter -->
    <div class="list">
        {% for p in passwords %}
            <div class="item">
                <div class="item-top">
                    <span class="note">{{ p.note }}</span>
                    <span style="font-size:11px; opacity:0.7;">ID: {{ p.id }}</span>
                </div>
                <div class="pw-text" id="pw-{{ p.id }}">{{ p.text }}</div>

                <div class="btn-row">
                    <button class="small-btn copy-btn" type="button" onclick="copyPW('{{ p.id }}')">
                        Kopieren
                    </button>

                    <form action="/delete/{{ p.id }}/" method="post" style="flex:1;">
                        {% csrf_token %}
                        <button class="small-btn delete-btn" type="submit">
                            Löschen
                        </button>
                    </form>
                </div>

                <div class="msg" id="msg-{{ p.id }}">Passwort kopiert!</div>
            </div>
        {% empty %}
            <p>Keine Passwörter gespeichert.</p>
        {% endfor %}
    </div>

    <form action="/dashboard/">
        <button class="main-btn back-btn" type="submit">Zurück</button>
    </form>
</div>

<script>
function copyPW(id) {
    const textEl = document.getElementById("pw-" + id);
    const msgEl = document.getElementById("msg-" + id);
    if (!textEl) return;

    const pw = textEl.innerText;

    navigator.clipboard.writeText(pw).then(function () {
        if (msgEl) {
            msgEl.style.display = "block";
            setTimeout(function () {
                msgEl.style.display = "none";
            }, 1500);
        }
    });
}
</script>

</body>
</html>
