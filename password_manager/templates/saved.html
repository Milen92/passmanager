{% load static %}
<link rel="stylesheet" href="{% static 'style.css' %}">

<h1>Gespeicherte Passwörter</h1>

<table border="1" cellpadding="5" cellspacing="0">
    <tr>
        <th>Titel</th>
        <th>Benutzername</th>
        <th>Passwort</th>
    </tr>

    {% for p in pwlist %}
    <tr>
        <td>{{ p.0 }}</td>
        <td>{{ p.1 }}</td>
        <td>{{ p.2 }}</td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="/save/">Neues Passwort speichern</a>
